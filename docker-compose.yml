services:
  modaily:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: modaily-app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: file:/data/dev.db
      PORT: 3001
      HOSTNAME: 0.0.0.0
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - modaily_node_modules:/app/node_modules
      - modaily_next:/app/.next
      - modaily_data:/data

volumes:
  modaily_node_modules:
  modaily_next:
  modaily_data:

services:
  modaily:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modaily-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/dev.db
      PORT: 3000
    volumes:
      - modaily_data:/data

volumes:
  modaily_data:
